<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neraium | Infrastructure Intelligence</title>

<style>
:root{
    --bg-top:#050e15;
    --bg-bottom:#03070b;
    --accent:#4da3ff;
    --text:#e6edf5;
    --muted:#97a6b7;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
    background:linear-gradient(to bottom,var(--bg-top),var(--bg-bottom));
    color:var(--text);
    -webkit-font-smoothing:antialiased;
}

a{
    text-decoration:none;
    color:inherit;
}

nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:22px 36px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(5,14,21,0.9);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,0.035);
    z-index:100;
}

.brand{
    font-weight:600;
    letter-spacing:2px;
    font-size:13px;
    color:white;
}

.nav-links{
    display:flex;
    gap:32px;
    font-size:13px;
    color:var(--muted);
}

.nav-links a:hover{
    color:white;
}

.container{
    max-width:760px;
    margin:0 auto;
    padding:170px 24px 140px;
}

.hero h1{
    font-size:clamp(44px, 6vw, 66px);
    line-height:1.02;
    margin:0 0 18px 0;
    font-weight:600;
    letter-spacing:-0.5px;
}

.hero p{
    font-size:19px;
    color:var(--muted);
    max-width:620px;
    margin-bottom:30px;
}

.cta{
    display:inline-block;
    padding:14px 28px;
    background:linear-gradient(135deg,#4da3ff,#3a8de0);
    color:#04111c !important;
    font-weight:600;
    border-radius:8px;
    box-shadow:0 12px 36px rgba(77,163,255,0.22);
    transition:all 0.25s ease;
}

.cta:hover{
    transform:translateY(-2px);
    box-shadow:0 20px 60px rgba(77,163,255,0.32);
}

.footer-note{
    margin-top:44px;
    font-size:14px;
    color:var(--muted);
    line-height:1.6;
}
</style>
</head>

<body>

<nav>
    <div class="brand">NERAIUM</div>
    <div class="nav-links">
        <a href="#">Platform</a>
        <a href="#">Contractors</a>
        <a href="#">Governance</a>
        <a href="#">About</a>
    </div>
</nav>

<div class="container">
    <div class="hero">
        <h1>
            Structural Deterioration Identified Before Failure.
        </h1>

        <p>
            Infrastructure intelligence for mission-critical water systems.
        </p>

        <a href="mailto:craig@neraium.com" class="cta">
            Initiate Alignment Discussion
        </a>

        <div class="footer-note">
            Read-only architecture. No actuation. Delivered through contractors.
        </div>
    </div>
</div>

</body>
</html>
