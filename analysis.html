<script>
  const API_URL = "/api/analyze";

  const fileInput = document.getElementById("fileInput");
  const analyzeBtn = document.getElementById("analyzeBtn");
  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");

  const progressBar = document.getElementById("progressBar");
  const progressLabel = document.getElementById("progressLabel");
  const progressPct = document.getElementById("progressPct");

  function setProgress(pct, label){
    const p = Math.max(0, Math.min(100, pct));
    progressBar.style.width = p + "%";
    progressPct.textContent = p + "%";
    progressLabel.textContent = label;
  }

  function showResult(obj){
    resultEl.style.display = "block";
    document.getElementById("rowsProcessed").textContent = obj.rows_processed ?? "-";
    document.getElementById("leadTime").textContent = obj.metrics?.lead_time ?? obj.metrics?.estimated_lead_time ?? "-";
    document.getElementById("jobStatus").textContent = obj.status ?? "Complete";

    document.getElementById("tsCol").textContent = obj.detected_schema?.timestamp_col ?? "-";
    document.getElementById("failCol").textContent = obj.detected_schema?.failure_col ?? "-";
    document.getElementById("entityCol").textContent = obj.detected_schema?.entity_col ?? "-";

    document.getElementById("notes").textContent =
      obj.message ?? "Analysis complete. Review detected schema for correctness.";
  }

  analyzeBtn.addEventListener("click", () => {
    const file = fileInput.files[0];

    if(!file){
      statusEl.textContent = "Please choose a CSV file.";
      return;
    }

    if(!file.name.toLowerCase().endsWith(".csv")){
      statusEl.textContent = "Please upload a CSV file.";
      return;
    }

    statusEl.textContent = "Starting upload...";
    resultEl.style.display = "none";
    setProgress(5, "Preparing");

    const form = new FormData();
    form.append("file", file);

    const xhr = new XMLHttpRequest();
    xhr.open("POST", API_URL, true);

    xhr.upload.onprogress = (e) => {
      if(e.lengthComputable){
        const pct = Math.round((e.loaded / e.total) * 70);
        setProgress(pct, "Uploading");
      }
    };

    xhr.onreadystatechange = () => {
      if(xhr.readyState === 2){
        setProgress(75, "Processing");
        statusEl.textContent = "Upload complete. Processing on backend...";
      }

      if(xhr.readyState === 4){
        if(xhr.status >= 200 && xhr.status < 300){
          setProgress(100, "Complete");
          statusEl.textContent = "Analysis complete.";

          try{
            showResult(JSON.parse(xhr.responseText));
          }catch{
            statusEl.textContent = "Error: unreadable server response.";
          }
        }else{
          setProgress(100, "Failed");
          statusEl.textContent = "Analysis failed.";
        }
      }
    };

    xhr.send(form);

    let p = 76;
    const t = setInterval(() => {
      if(xhr.readyState === 4){
        clearInterval(t);
        return;
      }
      if(p < 94){
        p += 1;
        setProgress(p, "Processing");
      }
    }, 250);
  });
</script>
