<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neraium | Technical Overview</title>
<meta name="description" content="Technical overview of Neraium's read-only signal interpretation layer.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:           #000000;
  --bg-raised:    #0c0c0c;
  --text:         #ffffff;
  --muted:        rgba(255,255,255,0.52);
  --muted-soft:   rgba(255,255,255,0.32);
  --border:       rgba(255,255,255,0.09);
  --border-hi:    rgba(255,255,255,0.20);
  --max:          1200px;
  --mono:         'IBM Plex Mono', monospace;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.container {
  width: 100%;
  max-width: var(--max);
  margin: 0 auto;
  padding: 0 48px;
}

/* ── Nav ─────────────────────────────────── */
.site-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.90);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.nav-wordmark {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text);
  text-decoration: none;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 36px;
  list-style: none;
}

.nav-links a {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.15s;
}
.nav-links a:hover { color: var(--text); }
.nav-links a.active { color: var(--text); }

/* ── Intro ───────────────────────────────── */
.intro {
  padding: 148px 0 88px;
  border-bottom: 1px solid var(--border);
}

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 48px;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted-soft);
  text-decoration: none;
  transition: color 0.15s;
}
.back-link:hover { color: var(--text); }
.back-link::before { content: "←"; font-size: 12px; }

.intro-eyebrow {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
}
.intro-eyebrow::before {
  content: "";
  display: block;
  width: 28px;
  height: 1px;
  background: var(--muted-soft);
  flex-shrink: 0;
}
.intro-eyebrow span {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.intro h1 {
  font-size: clamp(38px, 5vw, 60px);
  font-weight: 300;
  line-height: 1.06;
  letter-spacing: -0.030em;
  margin-bottom: 24px;
}
.intro h1 em { font-style: normal; font-weight: 600; }

.intro p {
  max-width: 620px;
  font-size: 16px;
  font-weight: 300;
  color: var(--muted);
  line-height: 1.74;
}

/* ── Spec layout ─────────────────────────── */
.spec { border-top: 1px solid var(--border); }

.spec-row {
  display: grid;
  grid-template-columns: minmax(200px, 260px) minmax(0, 1fr);
  gap: 48px;
  padding: 64px 0;
  border-bottom: 1px solid var(--border);
}

.spec-label { padding-top: 3px; }

.spec-label .section-index {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted-soft);
  letter-spacing: 0.10em;
  margin-bottom: 8px;
}

.spec-label h2 {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

.spec-body p {
  max-width: 680px;
  font-size: 17px;
  font-weight: 300;
  color: rgba(255,255,255,0.82);
  line-height: 1.74;
  margin-bottom: 0;
}

.spec-body p + p { margin-top: 18px; }

/* ── Code block ──────────────────────────── */
.code-block {
  margin-top: 28px;
  border: 1px solid var(--border);
  background: var(--bg-raised);
  overflow: hidden;
}

.code-block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.018);
}

.code-block
