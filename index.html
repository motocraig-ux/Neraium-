<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neraium</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter, sans-serif;
background:#050505;
color:white;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(5,5,5,.7);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,.08);
z-index:100;
}

.nav-inner{
max-width:1100px;
margin:auto;
display:flex;
justify-content:flex-end;
padding:18px 28px;
}

.nav-inner a{
font-family:"IBM Plex Mono";
font-size:12px;
letter-spacing:.18em;
text-decoration:none;
color:white;
margin-left:28px;
opacity:.85;
}

.nav-inner a:hover{
opacity:1;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background-image:url("hero.png");
background-size:cover;
background-position:center;
position:relative;
}

.overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.65);
}

.hero-glow{
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle, rgba(77,184,255,.15), transparent 70%);
filter:blur(120px);
top:40%;
left:50%;
transform:translate(-50%,-50%);
}

.hero-content{
position:relative;
max-width:700px;
padding:40px;
}

.hero h1{
font-size:clamp(64px,12vw,110px);
margin:0;
letter-spacing:-0.03em;
font-weight:600;
text-shadow:0 10px 40px rgba(0,0,0,.6);
}

.hero h2{
margin-top:10px;
font-weight:400;
color:rgba(255,255,255,.8);
}

/* CONTACT */

.contact{
padding:120px 30px;
max-width:900px;
margin:auto;
text-align:center;
border-top:1px solid rgba(255,255,255,.06);
}

.contact h3{
font-size:30px;
margin-bottom:12px;
}

.contact p{
color:rgba(255,255,255,.7);
line-height:1.7;
}

/* FOOTER */

footer{
border-top:1px solid rgba(255,255,255,.08);
padding:40px;
text-align:center;
font-size:12px;
color:rgba(255,255,255,.4);
}

</style>

</head>

<body>

<nav>

<div class="nav-inner">

<a href="technical.html">TECHNICAL</a>
<a href="#contact">CONTACT</a>

</div>

</nav>

<section class="hero">

<div class="overlay"></div>
<div class="hero-glow"></div>

<div class="hero-content">

<h1>Neraium</h1>

<h2>Systemic Infrastructure Intelligence</h2>

</div>

</section>

<section id="contact" class="contact">

<h3>Contact</h3>

<p>
Craig Curtis<br>
Founder<br><br>
craig@neraium.com
</p>

</section>

<footer>

© 2026 Neraium

</footer>

</body>
</html>
