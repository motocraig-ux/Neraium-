<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neraium | Systemic Infrastructure Intelligence</title>
<meta name="description" content="Read-only systemic infrastructure intelligence. Neraium ingests existing telemetry and identifies sustained structural deviation before failure.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#020308;
  --text:#f2f6ff;
  --sub:rgba(242,246,255,0.82);
  --muted:rgba(242,246,255,0.55);
  --accent:#00b4ff;
  --border:rgba(255,255,255,0.08);
  --mono:'IBM Plex Mono', monospace;
  --sans:'Inter', sans-serif;
  --nav-h:72px;
  --max:1200px;
  --pad:24px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

.container{
  max-width:var(--max);
  margin:0 auto;
  padding:0 var(--pad);
}

/* NAV */

nav{
  position:fixed;
  top:0;left:0;right:0;
  height:var(--nav-h);
  background:rgba(2,3,8,0.75);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  z-index:100;
}

.nav-inner{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:flex-end;
}

.nav-links{
  display:flex;
  gap:28px;
  list-style:none;
}

.nav-links a{
  font-family:var(--mono);
  font-size:11px;
  letter-spacing:2px;
  text-transform:uppercase;
  text-decoration:none;
  color:rgba(242,246,255,0.75);
  transition:color .2s;
}

.nav-links a:hover{
  color:var(--accent);
}

/* HERO */

.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  padding:calc(var(--nav-h) + 100px) 0 120px;
  overflow:hidden;
}

.hero-bg{
  position:absolute;
  inset:0;
  z-index:0;
  transition:transform 0.1s linear;
}

/* Image layer */
.hero-bg:after{
  content:"";
  position:absolute;
  inset:-10% 0 -10% 0;
  background-image:url("hero.png");
  background-size:120%;
  background-position:center 5%;
  background-repeat:no-repeat;
  opacity:0.92;
  filter:brightness(1.25) contrast(1.05);
  z-index:1;
}

/* Overlay with subtle industrial blue wash */
.hero-bg:before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(
      180deg,
      rgba(8,14,24,0.35) 0%,
      rgba(5,10,18,0.55) 55%,
      rgba(2,4,8,0.9) 100%
    ),
    linear-gradient(
      90deg,
      rgba(0,180,255,0.08) 0%,
      rgba(0,180,255,0.03) 40%,
      transparent 70%
    );
  z-index:2;
}

.hero-inner{
  position:relative;
  z-index:3;
  max-width:780px;
}

.hero h1{
  font-size:clamp(52px,8vw,100px);
  font-weight:800;
  letter-spacing:-2px;
  margin-bottom:14px;
}

.hero h2{
  font-size:clamp(18px,2.2vw,28px);
  font-weight:500;
  color:var(--sub);
  margin-bottom:28px;
}

.hero p{
  font-size:clamp(15px,1.3vw,18px);
  line-height:1.7;
  color:var(--sub);
}

/* SECTION */

section{
  padding:110px 0;
  border-top:1px solid var(--border);
  position:relative;
}

/* Smooth fade from hero */
section:first-of-type:before{
  content:"";
  position:absolute;
  top:-120px;
  left:0;
  right:0;
  height:120px;
  background:linear-gradient(
    180deg,
    rgba(2,4,8,0) 0%,
    rgba(2,4,8,1) 100%
  );
}

.section-title{
  font-size:30px;
  margin-bottom:20px;
}

.section-lead{
  max-width:820px;
  color:var(--sub);
  line-height:1.7;
}

.grid{
  margin-top:50px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:22px;
}

.card{
  padding:28px;
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border);
  border-radius:16px;
  backdrop-filter:blur(8px);
}

.card h3{
  font-size:17px;
  margin-bottom:10px;
}

.card p{
  font-size:14px;
  color:var(--sub);
  line-height:1.6;
}

footer{
  padding:80px 0;
  border-top:1px solid var(--border);
  font-size:13px;
  color:var(--muted);
}
